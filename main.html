<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title> Ali met </title>
    </head>

    <body>

        <div class="body-container">

            <div class="title-content">
                <div class="title-text-content">
                    <span> [ali] </span>
                    <span> [Met] </span>
                </div>
            </div>

            <div class="body-content">
                <div class="body-header">
                    <p> Choose a template:</p>
                </div>
                <div class="body-box">
                    <div class="body-choice" id="template_cs_4" onclick="chooseOpt(this.id)">
                        <span> Computer Science (4th semester) </span>
                    </div>
                    <div class="body-choice" id="template_chemistry_4" onclick="chooseOpt(this.id)">
                        <span> Chemistry (4th semester) </span>
                    </div>
                    <div class="body-choice" id="template_custom" onclick="chooseOpt(this.id)">
                        <span> Custom </span>
                    </div>

                </div>

                <div class="next-button-div" onclick="nextDisplayMode()">
                    <button type="button" class="next-button">
                        Next
                    </button>
                    <img src="arrow_right.png" height="24px">
                </div>

                <div class="body-question" onclick="rickroll()">
                    <span> <i> What happened to Ali? </i> </span>
                </div>

            </div>

            <div class="grades-table-text">
                <span> [grades] </span>
                <span> [table] </span>
            </div>

            <table class="grades-table">
                <thead>
                    <tr>
                        <th> Course </th>
                        <th> Credits </th>
                        <th> Grade </th>
                    </tr>
                </thead>

                <tbody class="grades-table-body">
                    <tr>
                        <td> I2206 </td>
                        <td> 5 </td>
                        <td>
                            <input id="I2206">
                        </td>
                    </tr>

                    <tr>
                        <td> I2207 </td>
                        <td> 4 </td>
                        <td>
                            <input id="I2207">
                        </td>
                    </tr>

                    <tr>
                        <td> I2208 </td>
                        <td> 4 </td>
                        <td>
                            <input id="I2208">
                        </td>
                    </tr>

                    <tr>
                        <td> I2209 </td>
                        <td> 4 </td>
                        <td>
                            <input id="I2209">
                        </td>
                    </tr>

                    <tr>
                        <td> I2210 </td>
                        <td> 5 </td>
                        <td>
                            <input id="I2210">
                        </td>
                    </tr>

                    <tr>
                        <td> I2211 </td>
                        <td> 5 </td>
                        <td>
                            <input id="I2211">
                        </td>
                    </tr>

                    <tr>
                        <td> I2234 </td>
                        <td> 3 </td>
                        <td>
                            <input id="I2234">
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="gpa-result">
                <p> GPA: 43.6 </p>
            </div>
            
            <div class="random-button-div">
                <button type="button" class="random-button" onclick="randomGenerator()">
                    Random grades generator
                </button>
                <div class="gears-icon-div" onclick="randomGeneratorInterface()">
                    <img src="edit.svg" height="24px">
                </div>
            </div>

            
            <div class="generator-interface">
                <table class="generator-interface-table">
                    <tbody class="table-body">
                        <tr id ="gpa-row">
                            <td> GPA: </td>
                            <td> 
                                <button onclick="gpaToggle(this)"> Random </button>
                            </td>
                        </tr>

                        <tr id ="min-grade-row">
                            <td>Min grade:</td>
                            <td>
                                <input value="0" id="min-grade-input">
                            </td>
                        </tr>

                        <tr id="max-grade-row">
                            <td>Max grade:</td>
                            <td>
                                <input value="100" id="max-grade-input">
                            </td>
                        </tr>

                        <tr>
                            <td> Absurd Mode: </td>
                            <td>
                                <button onclick="absurdToggle(this)"> OFF </button>
                            </td>
                        </tr>
                    </tbody>

                </table>

            <div class="btn-grp">
                <div class="generate-button-div" onclick="randomGenerator()">
                    <button type="button" class="generate-button">
                        GENERATE
                    </button>
                </div>

                <div class="back-button-div" onclick="randomGeneratorBack()">
                    <img src="arrow_left.png" height="24px">

                    <button type="button" class="back-button">
                        back
                    </button>
                </div>

            </div>
            </div>

            <div class="phantom-div"></div>

        </div>


        <div class="course-creator-interface">


            <table class="added-courses">

                <tbody>
                    <tr>
                        <td> Add a course... </td>
                    </tr>
                </tbody>

            </table>

            <div class="btn-grp-course-creator">
                <div class="generate-button-div" onclick="randomGenerator()">
                    <button type="button" class="generate-button">
                        Add
                    </button>
                </div>
                <div class="generate-button-div" onclick="randomGenerator()">
                    <button type="button" class="generate-button">
                        Done
                    </button>
                </div>
            </div>


        </div>



        <script type="text/javascript" src="script.js"></script>

    </body>

</html>
